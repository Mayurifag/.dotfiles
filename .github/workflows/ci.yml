name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
      - name: Install npm tools
        run: npm install -g markdownlint-cli2 @prantlf/jsonlint
      - name: Install ShellCheck
        run: |
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz -o shellcheck.tar.xz
          tar -xJf shellcheck.tar.xz
          sudo install shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
          shellcheck --version
      - name: Run CI checks
        run: make ci
