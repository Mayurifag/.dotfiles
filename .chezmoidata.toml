# .chezmoidata.toml
# Shared data consumed by .chezmoitemplates/ fragments.
# Secrets (e.g. GEMINI_API_KEY) are NOT here — use ejsonDecrypt in templates.
# Template conditions are NOT supported in this file — put OS conditions in fragments.

[sharedEnv]
EDITOR = "vim"
VISUAL = "code"
LC_ALL = "en_US.UTF-8"
SUDO_EDITOR = "vim"

[sharedAliases]
[sharedAliases.Editors]
vi = { cmd = "vim" }
v = { cmd = "vim" }

[sharedAliases.Chezmoi]
cz = { cmd = "chezmoi" }

[sharedAliases.Git]
lzg = { cmd = "lazygit" }
grc = { cmd = "git rebase --continue" }
gpf = { cmd = "yawn force-push" }
gri = { cmd = "git rebase --interactive" }
qwe = { cmd = "git add . && git commit --amend --no-edit && git push --force-with-lease origin HEAD", ps_cmd = "git add .; git commit --amend --no-edit; git push --force-with-lease origin HEAD" }
sq = { cmd = "yawn squash" }

[sharedAliases.Apps]
sher = { cmd = "sherlock --output /dev/null", ps_cmd = "sherlock --output NUL" }

[sharedAliases.Docker]
dcp = { cmd = "docker compose" }
docker-clean = { cmd = "docker container prune -f ; docker image prune -f ; docker network prune -f ; docker volume prune -f" }
lzd = { cmd = "lazydocker" }

[sharedAliases.eza]
ls = { cmd = "eza -lh --all --git --icons --group-directories-first" }
l = { cmd = "eza --all --icons --group-directories-first" }
ll = { cmd = "eza --all --header --long --git --icons --group-directories-first" }
llm = { cmd = "eza --all --header --long --sort=modified --git --icons --group-directories-first" }
la = { cmd = "eza -lbhHigUmuSa" }
lx = { cmd = "eza -lbhHigUmuSa@" }
lt = { cmd = "eza --tree --level=2 --icons" }
tree = { cmd = "eza --tree --level=2 --icons" }

[sharedAliases."yt-dlp"]
yt = { cmd = 'yt-dlp -v -o "%(title)s.%(ext)s" --sponsorblock-mark all --sponsorblock-remove "sponsor,selfpromo,interaction,intro,outro,preview,music_offtopic" --embed-thumbnail --embed-chapters --embed-metadata --concurrent-fragments 3 --retries 3' }
yta = { cmd = 'yt-dlp -f "ba" -x --audio-format mp3 --audio-quality 0 -o "%(title)s.%(ext)s" --embed-thumbnail --convert-thumbnails jpg --embed-metadata --parse-metadata "title:%(title)s" --parse-metadata "artist:%(artist,uploader|Unknown Artist)s" --sponsorblock-remove "sponsor,selfpromo,interaction,intro,outro,preview,music_offtopic" --sponsorblock-chapter-title "[SponsorBlock]: %(category)s" --embed-chapters --concurrent-fragments 3 --throttled-rate 100K --retries 10 --no-playlist' }

[sharedAliases.grep]
grep = { cmd = "grep --color=auto", ps_cmd = "grep.exe --color=auto" }

[sharedAliases."System utilities"]
df = { cmd = "df -h", ps_cmd = "df.exe -h" }
du = { cmd = "du -c -h", ps_cmd = "du.exe -c -h" }

[sharedAliases.Xray]
xray-cd = { cmd = 'cd "$XRAY_CFG"', ps_cmd = 'Set-Location $env:XRAY_CFG' }
xray-setup = { cmd = 'make -C "$XRAY_CFG" setup', ps_cmd = 'make -C $env:XRAY_CFG setup' }
xray-teardown = { cmd = 'make -C "$XRAY_CFG" teardown', ps_cmd = 'make -C $env:XRAY_CFG teardown' }
xray-restart = { cmd = 'make -C "$XRAY_CFG" restart', ps_cmd = 'make -C $env:XRAY_CFG restart' }
xray-test = { cmd = 'make -C "$XRAY_CFG" test', ps_cmd = 'make -C $env:XRAY_CFG test' }
xray-cycle = { cmd = 'make -C "$XRAY_CFG" cycle', ps_cmd = 'make -C $env:XRAY_CFG cycle' }
xray-status = { cmd = 'make -C "$XRAY_CFG" status', ps_cmd = 'make -C $env:XRAY_CFG status' }
xray-logs = { cmd = 'make -C "$XRAY_CFG" logs', ps_cmd = 'make -C $env:XRAY_CFG logs' }
xray-flush-dns = { cmd = 'make -C "$XRAY_CFG" flush-dns', ps_cmd = 'make -C $env:XRAY_CFG flush-dns' }
xray-geodata = { cmd = 'make -C "$XRAY_CFG" update-geodata', ps_cmd = 'make -C $env:XRAY_CFG update-geodata' }
