# .chezmoidata.toml
# Shared data consumed by .chezmoitemplates/ fragments.
# Secrets (e.g. GEMINI_API_KEY) are NOT here — use ejsonDecrypt in templates.
# Template conditions are NOT supported in this file — put OS conditions in fragments.

[sharedEnv]
EDITOR = "vim"
VISUAL = "code"
LC_ALL = "en_US.UTF-8"
SUDO_EDITOR = "vim"

[sharedAliases]
[sharedAliases.Editors]
vi = { cmd = "vim" }
v = { cmd = "vim" }

[sharedAliases.Chezmoi]
cz = { cmd = "chezmoi" }

[sharedAliases.Deploy]
dm = { cmd = "cd ~/Code/mayurifag.ru && make deploy HOST=mayurifag" }
dn = { cmd = "cd ~/Code/mayurifag.ru && make deploy HOST=nnnnn" }

[sharedAliases.Git]
lzg = { cmd = "lazygit" }
grc = { cmd = "git rebase --continue" }
gpf = { cmd = "q force-push" }
gri = { cmd = "git rebase --interactive" }
qwe = { cmd = "git add . && git commit --amend --no-edit && git push --force-with-lease origin HEAD", ps_cmd = "git add .; git commit --amend --no-edit; git push --force-with-lease origin HEAD" }
sq = { cmd = "q squash" }

[sharedAliases.Apps]
c = { cmd = "opencode" }
img = { cmd = "chafa" }
sher = { cmd = "sherlock --output /dev/null", ps_cmd = "sherlock --output NUL" }

[sharedAliases.Docker]
dcp = { cmd = "docker compose" }
docker-clean = { cmd = "docker container prune -f ; docker image prune -f ; docker network prune -f ; docker volume prune -f" }
lzd = { cmd = "lazydocker" }

[sharedAliases.eza]
ls = { cmd = "eza -lh --all --git --icons --group-directories-first" }
l = { cmd = "eza --all --icons --group-directories-first" }
ll = { cmd = "eza --all --header --long --git --icons --group-directories-first" }
llm = { cmd = "eza --all --header --long --sort=modified --git --icons --group-directories-first" }
la = { cmd = "eza -lbhHigUmuSa" }
lx = { cmd = "eza -lbhHigUmuSa@" }
lt = { cmd = "eza --tree --level=2 --icons" }
tree = { cmd = "eza --tree --level=2 --icons" }

[sharedAliases.grep]
grep = { cmd = "grep --color=auto", ps_cmd = "grep.exe --color=auto" }

[sharedAliases."System utilities"]
df = { cmd = "df -h", ps_cmd = "df.exe -h" }
du = { cmd = "du -c -h", ps_cmd = "du.exe -c -h" }
myip = { cmd = "command myip", ps_cmd = "myip.cmd" }
pkill = { cmd = "killport" }

[sharedAliases."Python scripts"]
czsrc = { cmd = "command czsrc", ps_cmd = "czsrc.cmd" }
dec = { cmd = "command dec", ps_cmd = "dec.cmd" }
enc = { cmd = "command enc", ps_cmd = "enc.cmd" }
gitignore = { cmd = "command gitignore", ps_cmd = "gitignore.cmd" }
npmug = { cmd = "command npmug", ps_cmd = "npmug.cmd" }
s = { cmd = "command s", ps_cmd = "s.cmd" }

[sharedAliases.Actions]
actions = { cmd = "npx actions-up -y" }

[sharedAliases.Proxies]
proxies-cd = { cmd = 'cd "$PROXIES_CFG"', ps_cmd = 'Set-Location $env:PROXIES_CFG' }
proxies-setup = { cmd = 'make -C "$PROXIES_CFG" setup', ps_cmd = 'make -C $env:PROXIES_CFG setup' }
proxies-teardown = { cmd = 'make -C "$PROXIES_CFG" teardown', ps_cmd = 'make -C $env:PROXIES_CFG teardown' }
proxies-restart = { cmd = 'make -C "$PROXIES_CFG" restart', ps_cmd = 'make -C $env:PROXIES_CFG restart' }
proxies-test = { cmd = 'make -C "$PROXIES_CFG" test', ps_cmd = 'make -C $env:PROXIES_CFG test' }
proxies-cycle = { cmd = 'make -C "$PROXIES_CFG" cycle', ps_cmd = 'make -C $env:PROXIES_CFG cycle' }
proxies-status = { cmd = 'make -C "$PROXIES_CFG" status', ps_cmd = 'make -C $env:PROXIES_CFG status' }
proxies-logs = { cmd = 'make -C "$PROXIES_CFG" logs', ps_cmd = 'make -C $env:PROXIES_CFG logs' }
proxies-flush-dns = { cmd = 'make -C "$PROXIES_CFG" flush-dns', ps_cmd = 'make -C $env:PROXIES_CFG flush-dns' }
proxies-geodata = { cmd = 'make -C "$PROXIES_CFG" update-geodata', ps_cmd = 'make -C $env:PROXIES_CFG update-geodata' }
